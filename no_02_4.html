
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; }

  .canvas {
    width: 580px;
    height: 400px;
    background-color: #FBF9F4;
    background-image: radial-gradient(circle, rgba(130,110,80,0.18) 1px, transparent 1px);
    background-size: 18px 18px;
    overflow: hidden;
    position: relative;
    font-family: system-ui, -apple-system, sans-serif;
    border-radius: 16px;
    border: 1px solid #d5cfc5;
    display: flex;
    align-items: center;
    padding: 0 48px;
  }

  /* ── Left ── */
  .left {
    flex: 0 0 180px;
    display: flex;
    flex-direction: column;
  }

  /* ── Right: card stack ── */
  .stack-wrap {
    flex: 1;
    position: relative;
    height: 310px;
    overflow: visible;
    cursor: default;
    margin-left: 10px;
  }

  .s-card {
    position: absolute;
    top: 0; left: 0;
    width: 262px;
    background: #FFFFFF;
    border-radius: 12px;
    border: 0.5px solid #e6e0d6;
    padding: 16px 18px;
    transform-origin: -110px 50%;  /* pivot at icon center */
    transition:
      transform  0.54s cubic-bezier(0.25, 0.46, 0.45, 0.94),
      top        0.54s cubic-bezier(0.25, 0.46, 0.45, 0.94),
      left       0.54s cubic-bezier(0.25, 0.46, 0.45, 0.94),
      opacity    0.4s  ease,
      box-shadow 0.3s  ease;
  }

  /* ── Initial: horizontal stack ── */
  .s-card:nth-child(1) {   /* back */
    top: calc(50% + 40px); left: 8px;
    transform: translateY(-50%);
    opacity: 0.35;
    border-color: #e0d9d0;
  }
  .s-card:nth-child(2) {   /* middle */
    top: 50%; left: 4px;
    transform: translateY(-50%);
    opacity: 0.65;
    border-color: #e0d9d0;
  }
  .s-card:nth-child(3) {   /* front */
    top: calc(50% - 40px); left: 0;
    transform: translateY(-50%);
    opacity: 1;
    border-color: #e0d9d0;
  }

  /* ── Hover: unfurl vertically ── */
  .canvas:hover .s-card:nth-child(1) {
    top: 219px;
    left: 0;
    transform: rotate(0deg);
    opacity: 1;
    border-color: #e0d9d0;
    transition-delay: 0.06s;
  }
  .canvas:hover .s-card:nth-child(2) {
    top: 50%;
    left: 0;
    transform: translateY(-50%);
    opacity: 1;
    border-color: #e0d9d0;
    transition-delay: 0.03s;
  }
  .canvas:hover .s-card:nth-child(3) {
    top: 1px;
    left: 0;
    transform: rotate(0deg);
    opacity: 1;
    border-color: #e0d9d0;
    transition-delay: 0s;
  }
</style>

<div class="canvas">

  <!-- ── Left: M2AI ── -->
  <div class="left">
    <div style="display:inline-flex;flex-direction:column;align-items:center;gap:6px;
                padding:26px 30px;border-radius:14px;
                border:1px solid #e0d9d0;background:rgba(255,255,255,0.6);">
      <div style="font-size:30px;font-weight:800;color:#6b5a3e;letter-spacing:-0.02em;line-height:1;">M2AI</div>
      <div style="font-size:9px;color:#c9a87a;letter-spacing:0.16em;text-transform:uppercase;">Protocol</div>
    </div>
  </div>

  <!-- ── Right: stacked cards ── -->
  <div class="stack-wrap">

    <!-- back (nth-child 1) -->
    <div class="s-card">
      <div style="font-size:10px;color:#b8a88a;font-weight:500;letter-spacing:0.06em;text-transform:uppercase;margin-bottom:6px;">Standard</div>
      <div style="font-size:12px;font-weight:500;color:#6b6359;line-height:1.45;">Standardized</div>
    </div>

    <!-- middle (nth-child 2) -->
    <div class="s-card">
      <div style="font-size:10px;color:#b8a88a;font-weight:500;letter-spacing:0.06em;text-transform:uppercase;margin-bottom:6px;">Consensus</div>
      <div style="font-size:12px;font-weight:500;color:#6b6359;line-height:1.45;">Frictionless machine-to-machine consensus</div>
    </div>

    <!-- front (nth-child 3) -->
    <div class="s-card">
      <div style="font-size:10px;color:#c9a87a;font-weight:600;letter-spacing:0.06em;text-transform:uppercase;margin-bottom:7px;">Protocol</div>
      <div style="font-size:13px;font-weight:600;color:#2c2924;line-height:1.45;">Machine-readable<br>commercial protocols</div>
    </div>

  </div>

</div>
